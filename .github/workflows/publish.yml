name: Publish Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build with embedded OAuth client
        run: pnpm build
        env:
          QUANG_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.QUANG_GOOGLE_OAUTH_CLIENT_ID }}
          QUANG_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.QUANG_GOOGLE_OAUTH_CLIENT_SECRET }}

      - name: Publish to npm
        run: npm publish
